{% extends 'index.html' %}

{% block navbar %}
    <ul class="navbar-nav ml-auto">
        <li class="nav-item">
            <a class="nav-link" href="{{url_for('index')}}" style="color: white;">Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{url_for('about')}}" style="color: white;">About</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{url_for('register')}}" style="color: white;">Register</a>
        </li>
        <li class="nav-item active">
            <a class="nav-link" href="{{url_for('login')}}" style="color: yellow;">Login</a>
        </li>
    </ul>
{% endblock %}

{% block content %}
    <div class="contact_section layout_padding" style="margin-top: -100px; min-height: 650px;">
        <div class="container">
            <div class="row">
                <div class="col-sm-12">
                    
                    <h1 class="contact_taital" style="color: yellow;">Login</h1>
                    <div class="bulit_icon"><img src="/static/images/bulit-icon.png"></div>
                </div>
            </div>
        </div>
        <div class="container-fluid">
            <div class="contact_section_2">
                <div class="row">
                    <div class="col-md-12">
                        <form action="{{url_for('login')}}" method="post">
                            <div class="mail_section_1">
                                <input type="email" name="email" class="mail_text" placeholder="Email ID" required>
                                <input type="password" name="password" class="mail_text" placeholder="Password" required>
                                <center>
                                    <button type="submit" class="btn btn-info" style="margin-top: 20px; width: 30%;">Submit</button>
                                </center>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
