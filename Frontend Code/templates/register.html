{% extends 'index.html' %}

{% block navbar %}
    <ul class="navbar-nav ml-auto">
        <li class="nav-item">
            <a class="nav-link" href="{{url_for('index')}}" style="color: white;">Home</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{url_for('about')}}" style="color: white;">About</a>
        </li>
        <li class="nav-item active">
            <a class="nav-link" href="{{url_for('register')}}" style="color: yellow;">Register</a>
        </li>
        <li class="nav-item">
            <a class="nav-link" href="{{url_for('login')}}" style="color: white;">Login</a>
        </li>
    </ul>
{% endblock %}

{% block content %}
    <div class="contact_section layout_padding" style="margin-top: -100px; min-height: 650px;">
        <div class="container">
            <div class="row">
                <div class="col-sm-12">
                   
                    <h1 class="contact_taital" style="color: yellow;">Registration</h1>

                    <div class="bulit_icon"><img src="/static/images/bulit-icon.png"></div>
                </div>
            </div>
        </div>
        <div class="container-fluid" style="margin-top: -50px;">
            <div class="contact_section_2">
                <div class="row">
                    <div class="col-md-12">
                        <form action="{{url_for('register')}}" method="post" onsubmit="return validateForm()">
                            <div class="mail_section_1">
                                <input type="text" name="name" class="mail_text" placeholder="User Name" required
                                       minlength="3" maxlength="30" pattern="[A-Za-z\s]+" title="User Name should be 3-30 characters long and only contain letters and spaces">
                                <input type="email" name="email" class="mail_text" placeholder="Email ID" required>
                                <input type="tel" name="mobile" class="mail_text" placeholder="Mobile Number" required
                                       pattern="[6-9]\d{9}" title="Mobile number should start with 6, 7, 8, or 9 and be exactly 10 digits long">
                                <input type="password" name="password" class="mail_text" placeholder="Password" required
                                       minlength="8" title="Password must be at least 8 characters long">
                                <input type="password" name="c_password" class="mail_text" placeholder="Confirm Password" required
                                       minlength="8" title="Password must be at least 8 characters long">
                                <center>
                                    <button type="submit" class="btn btn-info" style="margin-top: 20px; width: 30%;">Submit</button>
                                </center>
                            </div>
                        </form>
                        
                        <script>
                        function validateForm() {
                            var name = document.getElementsByName('name')[0].value;
                        
                            if (name.length < 3) {
                                alert("User Name must be at least 3 characters long.");
                                return false;
                            }
                        
                            // You can add other custom validations here as needed
                        
                            return true;
                        }
                        </script>
                                              
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
